<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spell Compendium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0e0c0a;
      --surface:   #181411;
      --border:    #3a2e1e;
      --gold:      #c9a84c;
      --gold-dim:  #7a6230;
      --red:       #8b2b2b;
      --text:      #e8dcc8;
      --muted:     #8a7a60;
      --highlight: #2a2218;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 15px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px 8px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
    }

    header h1 svg { flex-shrink: 0; }

    .search-row {
      display: flex;
      gap: 6px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Crimson Text', serif;
      font-size: 14px;
      padding: 5px 9px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--gold-dim); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 5px;
      padding: 7px 12px 6px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'Crimson Text', serif;
      font-size: 13px;
      padding: 4px 6px;
      outline: none;
      cursor: pointer;
      flex: 1;
      min-width: 80px;
    }
    select:focus { border-color: var(--gold-dim); color: var(--text); }

    .edition-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .edition-toggle button {
      background: var(--bg);
      border: none;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 4px 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .edition-toggle button.active {
      background: var(--gold-dim);
      color: var(--text);
    }

    /* ── Spell list ── */
    #spell-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .spell-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border-bottom: 1px solid #1e1a13;
      cursor: pointer;
      transition: background 0.12s;
      gap: 8px;
    }
    .spell-item:hover { background: var(--highlight); }
    .spell-item:active { background: #241f14; }

    .spell-name {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spell-item:hover .spell-name { color: var(--gold); }

    .spell-tags {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .tag {
      font-size: 10px;
      font-family: 'Cinzel', serif;
      padding: 2px 5px;
      border-radius: 2px;
      letter-spacing: 0.04em;
    }
    .tag-level {
      background: #1e1709;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
    }
    .tag-school {
      background: #1a0e0e;
      border: 1px solid #4a2020;
      color: #b06060;
    }
    .tag-concentration {
      background: #0e1318;
      border: 1px solid #1e3a4a;
      color: #5090b0;
      font-size: 9px;
    }

    /* ── Spell detail panel ── */
    #detail-panel {
      display: none;
      flex-direction: column;
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 10;
      overflow: hidden;
    }
    #detail-panel.visible { display: flex; }

    .detail-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: border-color 0.15s, color 0.15s;
    }
    .back-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

    .detail-title-block { flex: 1; }

    .detail-spell-name {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--gold);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .detail-subtitle {
      font-style: italic;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .stat-row { }
    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }
    .stat-value {
      font-size: 13px;
      color: var(--text);
      margin-top: 1px;
    }

    .desc-section h3 {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .desc-text {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
    }

    .higher-levels {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .higher-levels h3 {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .higher-levels p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Status messages ── */
    .status {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      font-style: italic;
      font-size: 14px;
    }

    .ornament {
      color: var(--gold-dim);
      font-size: 20px;
      display: block;
      margin-bottom: 8px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Loading dots ── */
    .loading-dots span {
      animation: blink 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Main list view -->
  <header>
    <h1>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Spell Compendium
    </h1>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search spells…" autocomplete="off" />
    </div>
  </header>

  <div class="filters">
    <select id="filter-level">
      <option value="">All Levels</option>
      <option value="0">Cantrip</option>
      <option value="1">1st</option>
      <option value="2">2nd</option>
      <option value="3">3rd</option>
      <option value="4">4th</option>
      <option value="5">5th</option>
      <option value="6">6th</option>
      <option value="7">7th</option>
      <option value="8">8th</option>
      <option value="9">9th</option>
    </select>
    <select id="filter-school">
      <option value="">All Schools</option>
      <option value="abjuration">Abjuration</option>
      <option value="conjuration">Conjuration</option>
      <option value="divination">Divination</option>
      <option value="enchantment">Enchantment</option>
      <option value="evocation">Evocation</option>
      <option value="illusion">Illusion</option>
      <option value="necromancy">Necromancy</option>
      <option value="transmutation">Transmutation</option>
    </select>
    <div class="edition-toggle">
      <button id="btn-2024" class="active" onclick="setEdition('srd-2024')">2024</button>
      <button id="btn-2014" onclick="setEdition('wotc-srd')">2014</button>
    </div>
  </div>

  <div id="spell-list">
    <div class="status">
      <span class="ornament">✦</span>
      <span class="loading-dots">Loading grimoire<span>.</span><span>.</span><span>.</span></span>
    </div>
  </div>

  <!-- Detail overlay -->
  <div id="detail-panel">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">← Back</button>
      <div class="detail-title-block">
        <div class="detail-spell-name" id="detail-name"></div>
        <div class="detail-subtitle" id="detail-subtitle"></div>
      </div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

  <script>
    // ── State ──
    let allSpells = [];
    let filteredSpells = [];
    let currentEdition = 'srd-2024';
    let searchTimer = null;

    // ── Fetch spells ──
    async function loadSpells(edition) {
      const list = document.getElementById('spell-list');
      list.innerHTML = `<div class="status"><span class="ornament">✦</span><span class="loading-dots">Loading grimoire<span>.</span><span>.</span><span>.</span></span></div>`;
      allSpells = [];

      try {
        let url = `https://api.open5e.com/v2/spells/?document__key__in=${edition}&limit=500&ordering=name`;
        let results = [];

        while (url) {
          const res = await fetch(url);
          if (!res.ok) throw new Error('API error');
          const data = await res.json();
          results = results.concat(data.results);
          url = data.next;
        }

        allSpells = results;
        applyFilters();
      } catch (e) {
        list.innerHTML = `<div class="status"><span class="ornament">✦</span>Could not reach the spell archives.<br><small style="color:#5a4a30;font-size:12px">Check your connection and try again.</small></div>`;
      }
    }

    // ── Filter & render ──
    function applyFilters() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const level = document.getElementById('filter-level').value;
      const school = document.getElementById('filter-school').value;

      filteredSpells = allSpells.filter(s => {
        const nameMatch = !query || s.name.toLowerCase().includes(query);
        const levelMatch = level === '' || String(s.level) === level;
        const schoolMatch = !school || (s.school && s.school.toLowerCase().includes(school));
        return nameMatch && levelMatch && schoolMatch;
      });

      renderList();
    }

    function renderList() {
      const list = document.getElementById('spell-list');

      if (filteredSpells.length === 0) {
        list.innerHTML = `<div class="status"><span class="ornament">✦</span>No spells found in these pages.</div>`;
        return;
      }

      list.innerHTML = filteredSpells.map((spell, i) => `
        <div class="spell-item" onclick="openDetail(${i})">
          <span class="spell-name">${spell.name}</span>
          <span class="spell-tags">
            ${spell.concentration ? '<span class="tag tag-concentration">CONC</span>' : ''}
            <span class="tag tag-school">${capitalise(spell.school || '—')}</span>
            <span class="tag tag-level">${spell.level === 0 ? 'C' : spell.level}</span>
          </span>
        </div>
      `).join('');
    }

    // ── Detail view ──
    function openDetail(index) {
      const spell = filteredSpells[index];
      if (!spell) return;

      document.getElementById('detail-name').textContent = spell.name;

      const levelStr = spell.level === 0
        ? 'Cantrip'
        : `${ordinal(spell.level)}-level`;
      const schoolStr = capitalise(spell.school || '');
      document.getElementById('detail-subtitle').textContent =
        [levelStr, schoolStr].filter(Boolean).join(' · ');

      const body = document.getElementById('detail-body');
      body.innerHTML = `
        <div class="stat-grid">
          <div class="stat-row">
            <div class="stat-label">Casting Time</div>
            <div class="stat-value">${spell.casting_time || '—'}</div>
          </div>
          <div class="stat-row">
            <div class="stat-label">Range</div>
            <div class="stat-value">${formatRange(spell.range)}</div>
          </div>
          <div class="stat-row">
            <div class="stat-label">Components</div>
            <div class="stat-value">${formatComponents(spell)}</div>
          </div>
          <div class="stat-row">
            <div class="stat-label">Duration</div>
            <div class="stat-value">${formatDuration(spell)}</div>
          </div>
          ${spell.classes ? `
          <div class="stat-row" style="grid-column:1/-1">
            <div class="stat-label">Classes</div>
            <div class="stat-value">${formatClasses(spell.classes)}</div>
          </div>` : ''}
        </div>

        <div class="desc-section">
          <h3>Description</h3>
          <div class="desc-text">${cleanDesc(spell.desc || '')}</div>
          ${spell.higher_level ? `
          <div class="higher-levels">
            <h3>At Higher Levels</h3>
            <p>${cleanDesc(spell.higher_level)}</p>
          </div>` : ''}
        </div>
      `;

      document.getElementById('detail-panel').classList.add('visible');
      body.scrollTop = 0;
    }

    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('visible');
    }

    // ── Edition toggle ──
    function setEdition(edition) {
      currentEdition = edition;
      document.getElementById('btn-2024').classList.toggle('active', edition === 'srd-2024');
      document.getElementById('btn-2014').classList.toggle('active', edition === 'wotc-srd');
      loadSpells(edition);
    }

    // ── Helpers ──
    function capitalise(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
    }

    function ordinal(n) {
      const s = ['th','st','nd','rd'];
      const v = n % 100;
      return n + (s[(v-20)%10] || s[v] || s[0]);
    }

    function formatRange(range) {
      if (!range) return '—';
      if (typeof range === 'string') return range;
      if (range.type === 'self') return 'Self';
      if (range.type === 'touch') return 'Touch';
      if (range.type === 'sight') return 'Sight';
      if (range.type === 'unlimited') return 'Unlimited';
      if (range.normal !== undefined) return `${range.normal} ft.`;
      return JSON.stringify(range);
    }

    function formatComponents(spell) {
      const parts = [];
      if (spell.requires_verbal_components) parts.push('V');
      if (spell.requires_somatic_components) parts.push('S');
      if (spell.requires_material_components) parts.push('M');
      // v2 might use different keys
      if (!parts.length) {
        if (spell.components) return spell.components;
      }
      let str = parts.join(', ');
      if (spell.material) str += ` (${spell.material})`;
      return str || '—';
    }

    function formatDuration(spell) {
      if (!spell.duration) return '—';
      if (typeof spell.duration === 'string') {
        return (spell.concentration ? 'Concentration, up to ' : '') + spell.duration;
      }
      return '—';
    }

    function formatClasses(classes) {
      if (!classes) return '—';
      if (Array.isArray(classes)) {
        return classes.map(c => typeof c === 'string' ? c : (c.name || '')).join(', ');
      }
      return String(classes);
    }

    function cleanDesc(text) {
      if (!text) return '';
      // Strip markdown bold/italic, convert **text** and *text*
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\n\n/g, '\n\n');
    }

    // ── Event listeners ──
    document.getElementById('search-input').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilters, 180);
    });

    document.getElementById('filter-level').addEventListener('change', applyFilters);
    document.getElementById('filter-school').addEventListener('change', applyFilters);

    // ── Init ──
    loadSpells(currentEdition);
  </script>
</body>
</html>
